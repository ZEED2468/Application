components:
  schemas:
    AnswerRequest:
      properties:
        prompt_id:
          type: string
          format: uuid
          title: Prompt Id
        selected:
          items:
            type: string
          type: array
          title: Selected
        detail:
          anyOf:
          - type: string
          - type: 'null'
          title: Detail
      type: object
      required:
      - prompt_id
      - selected
      title: AnswerRequest
    ApplicationOut:
      properties:
        id:
          type: string
          format: uuid
          title: Id
        job_id:
          type: string
          format: uuid
          title: Job Id
        company:
          anyOf:
          - type: string
          - type: 'null'
          title: Company
        role:
          anyOf:
          - type: string
          - type: 'null'
          title: Role
        track:
          anyOf:
          - $ref: '#/components/schemas/Track'
          - type: 'null'
        origin:
          anyOf:
          - $ref: '#/components/schemas/Origin'
          - type: 'null'
        status:
          $ref: '#/components/schemas/ApplicationStatus'
        tracker_status:
          $ref: '#/components/schemas/TrackerStatus'
        submitted_at:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Submitted At
      type: object
      required:
      - id
      - job_id
      - company
      - role
      - track
      - origin
      - status
      - tracker_status
      - submitted_at
      title: ApplicationOut
    ApplicationStatus:
      type: string
      enum:
      - draft
      - submitted
      - interview
      - rejected
      - offer
      - failed
      title: ApplicationStatus
    AuditEventOut:
      properties:
        id:
          type: string
          format: uuid
          title: Id
        kind:
          type: string
          title: Kind
        actor:
          type: string
          title: Actor
        detail:
          additionalProperties: true
          type: object
          title: Detail
        created_at:
          type: string
          format: date-time
          title: Created At
      type: object
      required:
      - id
      - kind
      - actor
      - detail
      - created_at
      title: AuditEventOut
    Body_upload_role_cv_api_onboarding_role_cv_post:
      properties:
        track:
          $ref: '#/components/schemas/Track'
        file:
          type: string
          contentMediaType: application/octet-stream
          title: File
      type: object
      required:
      - track
      - file
