openapi: 3.1.0
info:
  title: Job Application & Outreach Engine
  description: "\nBackend for the **Job Application & Outreach Engine** \u2014 a conversion-optimized,\n\
    multi-user job-application + outreach pipeline.\n\n### Auth\nMost endpoints require\
    \ an authenticated principal. Logging in via\n`POST /api/auth/login` sets an **httpOnly\
    \ `access_token` cookie** (+ a rotating\nrefresh token); subsequent requests are\
    \ authenticated by that cookie. The web app\nproxies the cookie server-side. Webhooks\
    \ (`/api/webhooks/*`) and the WhatsApp\nbridge authenticate with an **HMAC signature**,\
    \ not the cookie.\n\n### Pipelines\n- **Apply** \u2014 discover \u2192 score \u2192\
    \ track-classify \u2192 tailor (truth-bounded) \u2192 render \u2192 submit.\n\
    - **Outreach** \u2014 Apollo lookup \u2192 hook \u2192 draft \u2192 governed send\
    \ \u2192 follow-up sequencer.\n- **Respond** \u2014 match reply \u2192 classify\
    \ \u2192 dossier \u2192 WhatsApp bridge \u2192 relay.\n- **Manual** \u2014 VA\
    \ chatbot: paste JD \u2192 match CV \u2192 ATS gaps \u2192 confirm-true \u2192\
    \ generate.\n\n### Dev mode\nWith `USE_FAKE_INTEGRATIONS=true` every external\
    \ dependency (LLM, email, Apollo,\nR2, WhatsApp) is faked, so the whole API runs\
    \ with no credentials.\n"
  version: 1.0.0
