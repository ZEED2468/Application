services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: jd
      POSTGRES_PASSWORD: jd
      POSTGRES_DB: jd
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jd"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ../backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file: ../backend/.env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: ../backend
    command: celery -A app.workers.celery_app worker -Q default,email,render,poll --loglevel=info
    env_file: ../backend/.env
    depends_on:
      - redis
      - postgres

  beat:
    build: ../backend
    command: celery -A app.workers.celery_app beat --loglevel=info
    env_file: ../backend/.env
    depends_on:
      - redis

  bridge:
    build: ../bridge
    env_file: ../backend/.env
    ports:
      - "8081:8081"
    volumes:
      - whatsapp_session:/data
    depends_on:
      - api

volumes:
  pgdata:
  whatsapp_session:
