# nginx reverse proxy for the JD stack — origin for Cloudflare "Flexible" SSL.
#
# Cloudflare terminates HTTPS at its edge and connects to this origin over HTTP,
# so there's no TLS / certbot here — nginx just serves :80.
#
# Run alongside the main stack (from the repo root):
#   docker compose -f infra/docker-compose.yml -f infra/docker-compose.nginx.yml up -d

services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - web
      - api
    ports:
      - "80:80"
    volumes:
      - ./nginx/jd.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - jd
    restart: unless-stopped
