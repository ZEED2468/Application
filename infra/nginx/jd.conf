# ===========================================================================
# JD Engine — nginx reverse proxy (origin for Cloudflare "Flexible" SSL)
#
#   jd.quickbiteltd.org     -> WEB  (Next.js dashboard, :3000)
#   jd-be.quickbiteltd.org  -> API  (FastAPI backend, :8000) — webhooks + Swagger
#
# Cloudflare terminates HTTPS at its edge and connects to THIS origin over plain
# HTTP on :80. So there is no TLS / certbot here.
#
# IMPORTANT: do NOT redirect HTTP -> HTTPS at the origin — on Flexible that loops
# forever. Force HTTPS at the EDGE instead: Cloudflare dashboard → SSL/TLS →
# Edge Certificates → enable "Always Use HTTPS".
# ===========================================================================

upstream jd_web { server web:3000; }
upstream jd_api { server api:8000; }
# Host nginx instead? Use:  server 127.0.0.1:3000;  /  server 127.0.0.1:8000;

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Preserve the visitor's original scheme (https) that Cloudflare forwards, so the
# app knows the browser used HTTPS even though CF reaches us over HTTP.
map $http_x_forwarded_proto $fwd_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

# --- Real visitor IP from Cloudflare (optional) ------------------------------
# Without this, your logs show Cloudflare's IP, not the visitor's. Uncomment and
# keep the ranges current from https://www.cloudflare.com/ips/
# set_real_ip_from 173.245.48.0/20;
# set_real_ip_from 103.21.244.0/22;
# set_real_ip_from 103.22.200.0/22;
# set_real_ip_from 103.31.4.0/22;
# set_real_ip_from 141.101.64.0/18;
# set_real_ip_from 108.162.192.0/18;
# set_real_ip_from 190.93.240.0/20;
# set_real_ip_from 188.114.96.0/20;
# set_real_ip_from 197.234.240.0/22;
# set_real_ip_from 198.41.128.0/17;
# set_real_ip_from 162.158.0.0/15;
# set_real_ip_from 104.16.0.0/13;
# set_real_ip_from 104.24.0.0/14;
# set_real_ip_from 172.64.0.0/13;
# set_real_ip_from 131.0.72.0/22;
# set_real_ip_from 2400:cb00::/32;
# set_real_ip_from 2606:4700::/32;
# set_real_ip_from 2803:f800::/32;
# set_real_ip_from 2405:b500::/32;
# set_real_ip_from 2405:8100::/32;
# set_real_ip_from 2a06:98c0::/29;
# set_real_ip_from 2c0f:f248::/32;
# real_ip_header CF-Connecting-IP;

# ===========================================================================
# WEB — jd.quickbiteltd.org
# ===========================================================================
server {
    listen 80;
    listen [::]:80;
    server_name jd.quickbiteltd.org;

    client_max_body_size 25m;   # CV / document uploads

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $fwd_proto;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        $connection_upgrade;

    location / {
        proxy_pass http://jd_web;
    }
}

# ===========================================================================
# BACKEND API — jd-be.quickbiteltd.org
# ===========================================================================
server {
    listen 80;
    listen [::]:80;
    server_name jd-be.quickbiteltd.org;

    client_max_body_size 25m;

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $fwd_proto;

    # Webhooks: stream the body so the HMAC signature verifies byte-for-byte.
    location /api/webhooks/ {
        proxy_pass http://jd_api;
        proxy_request_buffering off;
    }
    location / {
        proxy_pass http://jd_api;
    }
}
